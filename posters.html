<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posters — Prof Anwar Hussain Syed Fine Academy of Sciences</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .poster-page-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .poster-page-card{background:white;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
    .poster-page-card img{width:100%;height:520px;object-fit:cover;display:block}
    .poster-page-card div{padding:16px}
    .poster-page-card h3{font-size:20px;margin:0 0 4px}
    .poster-page-card p{margin:0;color:var(--muted);font-weight:800}
    @media(max-width:900px){.poster-page-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.poster-page-grid{grid-template-columns:1fr}.poster-page-card img{height:auto}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><img src="assets/images/logo.png" alt="Logo"><span>Prof Anwar Hussain Syed Fine Academy of Sciences</span></a>
    <nav><a href="index.html">Home</a><a href="uploaded-faculty.html">Faculty</a><a href="admin.html">Update Panel</a></nav>
  </header>
  <main class="section">
    <div class="section-title"><p>Academy Media</p><h2>Admission & Promotional Posters</h2></div>
    <div class="poster-page-grid" id="posterPageList"></div>
  </main>
  <script src="data/site-data.js"></script>
  <script>
    const data = window.AcademyData || {};
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    const posters = data.posters && data.posters.length ? data.posters : (data.gallery || []).map(g => ({...g, category:"Gallery"}));
    document.getElementById("posterPageList").innerHTML = posters.map(p => `
      <article class="poster-page-card">
        <img src="${esc(p.image)}" alt="${esc(p.title)}">
        <div><h3>${esc(p.title)}</h3><p>${esc(p.category || "Poster")}</p></div>
      </article>
    `).join("");
  </script>
</body>
</html>
